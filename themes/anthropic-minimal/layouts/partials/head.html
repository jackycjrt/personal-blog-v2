<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#faf9f5" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#11100e" media="(prefers-color-scheme: dark)" />
{{ $title := cond .IsHome .Site.Title (printf "%s · %s" .Title .Site.Title) }}
{{ $description := .Params.summary | default .Description | default .Site.Params.description }}
<title>{{ $title }}</title>
<meta name="description" content="{{ $description }}" />
<link rel="canonical" href="{{ .Permalink }}" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
{{ $css := resources.Get "css/main.css" | resources.Minify | resources.Fingerprint }}
<link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}" />
<script>
  (function () {
    var configured = "{{ .Site.Params.defaultTheme | default "auto" }}";
    var stored = null;
    try {
      stored = localStorage.getItem("theme");
    } catch (error) {
      stored = null;
    }

    var resolved;
    if (stored === "light" || stored === "dark") {
      resolved = stored;
    } else if (configured === "light" || configured === "dark") {
      resolved = configured;
    } else {
      resolved = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    document.documentElement.setAttribute("data-theme", resolved);
  })();
</script>
