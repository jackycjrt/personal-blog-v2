<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default .Site.Language.Lang | default "zh-CN" }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    <a class="skip-link" href="#mainContent">跳到正文</a>
    {{ partial "header.html" . }}

    <main id="mainContent" class="main-content">
      {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}

    {{ $js := resources.Get "js/main.js" | resources.Minify | resources.Fingerprint }}
    <script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}" defer></script>
  </body>
</html>
